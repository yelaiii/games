pre-commit:
  piped: true
  jobs:
    - name: fmt
      run: pnpm oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: lint
      run: pnpm oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

prepare-commit-msg:
  commands:
    prepare:
      run: node ./scripts/prepare-commit-msg.ts {1}
